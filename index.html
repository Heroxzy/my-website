<!-- QUIZ GAME -->
<div id="quiz" class="screen">
  <div class="card">

    <h2>🧠 Math Quiz Game</h2>

    <p id="level">Level: Easy</p>

    <p id="question">Loading...</p>

    <button onclick="check(0)" id="opt1"></button>
    <button onclick="check(1)" id="opt2"></button>
    <button onclick="check(2)" id="opt3"></button>

    <p>Score: <span id="qscore">0</span></p>

    <button onclick="nextLevel()">Next Level ➡️</button>

  </div>
</div>
