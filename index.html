<hr>

<div style="max-width:500px;margin:auto;background:white;padding:20px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);">

  <h2 style="text-align:center;">🧠 Quiz Game</h2>

  <div id="question"
       style="font-size:18px;margin:20px 0;text-align:center;font-weight:bold;">
    Click Start to begin!
  </div>

  <div id="options" style="display:flex;flex-direction:column;gap:10px;"></div>

  <hr>

  <p style="text-align:center;">
    Score: <b><span id="quizScore">0</span></b> |
    🏆 High Score: <b><span id="quizHighScore">0</span></b>
  </p>

  <div style="text-align:center;">
    <button onclick="startQuiz()" style="padding:10px 15px;border:none;background:#4CAF50;color:white;border-radius:8px;cursor:pointer;">
      Start Quiz
    </button>

    <button onclick="resetQuiz()" style="padding:10px 15px;border:none;background:#f44336;color:white;border-radius:8px;cursor:pointer;">
      Reset
    </button>
  </div>

</div>
