<hr>

<h2>🎮 Mini Click Game</h2>

<p>Click the button as many times as you can!</p>

<h3>Score: <span id="score">0</span></h3>

<button onclick="addScore()" style="padding:10px 20px; font-size:16px; cursor:pointer;">
  Click Me!
</button>

<br><br>

<button onclick="resetScore()" style="padding:8px 15px;">
  Reset Game
</button>

<script>
let score = 0;

function addScore() {
  score++;
  document.getElementById("score").innerText = score;
}

function resetScore() {
  score = 0;
  document.getElementById("score").innerText = score;
}
</script>
