<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fun Study Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    header {
      background: linear-gradient(90deg, #4CAF50, #2E7D32);
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      margin: 0;
    }

    nav {
      background: #222;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    .container {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    button {
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      width: 100%;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 12px;
    }
  </style>
</head>
