<!-- QUIZ GAME -->
<div id="quiz" class="screen">
  <div class="card">
    <h2>🧠 Quiz Game</h2>

    <p id="question">Loading...</p>

    <button onclick="checkAnswer(0)" id="opt1"></button>
    <button onclick="checkAnswer(1)" id="opt2"></button>
    <button onclick="checkAnswer(2)" id="opt3"></button>

    <p>Score: <span id="qscore">0</span></p>
    <button onclick="nextQuestion()">Next ➡️</button>
  </div>
</div>

<script>
let score = 0;
let qscore = 0;
let current = 0;

const quiz = [
  {
    q: "What is 2 + 2?",
    options: ["3", "4", "5"],
    answer: 1
  },
  {
    q: "What is capital of Nepal?",
    options: ["Kathmandu", "Delhi", "London"],
    answer: 0
  },
  {
    q: "HTML is used for?",
    options: ["Styling", "Structure", "Gaming"],
    answer: 1
  },
  {
    q: "CSS is used for?",
    options: ["Design", "Database", "Hardware"],
    answer: 0
  },
  {
    q: "JavaScript is used for?",
    options: ["Logic", "Painting", "Printing"],
    answer: 0
  }
];

function loadQuestion(){
  let q = quiz[current];
  document.getElementById("question").innerText = q.q;
  document.getElementById("opt1").innerText = q.options[0];
  document.getElementById("opt2").innerText = q.options[1];
  document.getElementById("opt3").innerText = q.options[2];
}

function checkAnswer(i){
  if(i === quiz[current].answer){
    qscore++;
    alert("Correct 🎉");
  } else {
    alert("Wrong ❌");
  }
  document.getElementById("qscore").innerText = qscore;
}

function nextQuestion(){
  current++;
  if(current >= quiz.length){
    alert("Quiz Finished! Your score: " + qscore);
    current = 0;
    qscore = 0;
    document.getElementById("qscore").innerText = qscore;
  }
  loadQuestion();
}

// start quiz
loadQuestion();
</script>
