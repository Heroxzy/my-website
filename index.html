<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Games App</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
  }

  .topbar {
    background: #4CAF50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  .screen {
    display: none;
    padding: 15px;
  }

  .active {
    display: block;
  }

  .card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  button {
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    font-size: 16px;
    margin-top: 10px;
  }

  .navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: white;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
  }

  .nav {
    flex: 1;
    text-align: center;
    padding: 10px;
    cursor: pointer;
  }

</style>
</head>

<body>

<div class="topbar">🎮 Mini Games App</div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="card">
    <h2>Welcome 👋</h2>
    <p>Play Click Game and Quiz Game</p>
  </div>
</div>

<!-- CLICK GAME -->
<div id="click" class="screen">
  <div class="card">
    <h2>👆 Click Game</h2>
    <p>Score: <span id="score">0</span></p>
    <button onclick="addScore()">Click Me!</button>
    <button onclick="resetScore()">Reset</button>
  </div>
</div>

<!-- QUIZ GAME -->
<div id="quiz" class="screen">
  <div class="card">
    <h2>🧠 Quiz Game</h2>

    <p id="question">What is 2 + 2?</p>

    <button onclick="answer(4)">4</button>
    <button onclick="answer(5)">5</button>
    <button onclick="answer(6)">6</button>

    <p>Score: <span id="qscore">0</span></p>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav" onclick="show('home')">🏠 Home</div>
  <div class="nav" onclick="show('click')">👆 Click</div>
  <div class="nav" onclick="show('quiz')">🧠 Quiz</div>
</div>

  document.getElementById("clickBtn").disabled = false;
