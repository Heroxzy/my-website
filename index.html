<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Study App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.topbar {
  background:#1e293b;
  padding:15px;
}

.card {
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:12px;
}

button {
  padding:10px;
  width:90%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<div class="topbar">
<h2>📱 Fun Study App</h2>
</div>

<div class="card">
<h3>🎮 Game</h3>
<button onclick="playGame()">Play Guess Game</button>
</div>

<div class="card">
<h3>📖 Quiz</h3>
<button onclick="quiz()">Start Quiz</button>
</div>

<script>
function playGame(){
  let num = Math.floor(Math.random()*5)+1;
  let guess = prompt("Guess number 1-5");
  if(guess == num){
    alert("🎉 Correct!");
  } else {
    alert("❌ Wrong number was " + num);
  }
}

function quiz(){
  let ans = confirm("Is Internet a network of computers?");
  if(ans){
    alert("✅ Correct!");
  } else {
    alert("❌ Wrong!");
  }
}
</script>

</body>
</html>
