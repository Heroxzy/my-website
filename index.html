<!-- QUIZ GAME -->
<div id="quiz" class="screen">
  <div class="card quiz-card">

    <!-- START SCREEN -->
    <div id="startScreen">
      <h2>🎮 Quiz Challenge Game</h2>
      <p>Press Start to begin the game</p>
      <button class="btn" onclick="startGame()">▶️ Start Game</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameBox" style="display:none;">

      <h2>⚡ 10 Second Challenge</h2>

      <p class="timer">Time Left: <span id="time">10</span> sec</p>

      <p id="question" class="question">Loading...</p>

      <button class="btn" onclick="checkAnswer(0)" id="opt1"></button>
      <button class="btn" onclick="checkAnswer(1)" id="opt2"></button>
      <button class="btn" onclick="checkAnswer(2)" id="opt3"></button>

      <p>Score: <span id="qscore">0</span></p>

    </div>

  </div>
</div>

<style>
.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.btn:active {
  transform: scale(0.95);
}

.timer {
  font-weight: bold;
}

.quiz-card {
  animation: popIn 0.4s ease;
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>

<script>
let qscore = 0;
let current = 0;
let time = 10;
let timer;

const quiz = [
  { q: "2 + 2 = ?", options: ["3", "4", "5"], answer: 1 },
  { q: "Capital of Nepal?", options: ["Kathmandu", "Delhi", "Tokyo"], answer: 0 },
  { q: "HTML is used for?", options: ["Structure", "Style", "Music"], answer: 0 },
  { q: "CSS is used for?", options: ["Design", "Math", "Game"], answer: 0 },
  { q: "JS is used for?", options: ["Logic", "Drawing", "Typing"], answer: 0 }
];

// START GAME
function startGame(){
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameBox").style.display = "block";

  qscore = 0;
  current = 0;
  time = 10;

  document.getElementById("qscore").innerText = qscore;
  document.getElementById("time").innerText = time;

  loadQuestion();
  startTimer();
}

// TIMER
function startTimer(){
  clearInterval(timer);

  timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      clearInterval(timer);
      endGame();
    }
  }, 1000);
}

// LOAD QUESTION
function loadQuestion(){
  let q = quiz[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("opt1").innerText = q.options[0];
  document.getElementById("opt2").innerText = q.options[1];
  document.getElementById("opt3").innerText = q.options[2];
}

// ANSWER
function checkAnswer(i){
  if(i === quiz[current].answer){
    qscore++;
  }

  document.getElementById("qscore").innerText = qscore;

  current++;

  if(current >= quiz.length){
    endGame();
  } else {
    loadQuestion();
  }
}

// END GAME
function endGame(){
  clearInterval(timer);

  alert("🎮 Game Over! Score: " + qscore);

  document.getElementById("startScreen").style.display = "block";
  document.getElementById("gameBox").style.display = "none";
}
</script>
