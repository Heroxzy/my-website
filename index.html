<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fun Study Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    /* HEADER */
    header {
      background: linear-gradient(90deg, #4CAF50, #2E7D32);
      color: white;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      margin-top: 10px;
      font-size: 18px;
    }

    /* NAV */
    nav {
      background: #222;
      text-align: center;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #4CAF50;
    }

    /* SECTIONS */
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2E7D32;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎉 Fun Study Hub</h1>
  <p>Learn • Play • Grow</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Study</a>
  <a href="#">Fun</a>
  <a href="#">Contact</a>
</nav>

<div class="container">

  <div class="card">
    <h2>📚 Study</h2>
    <p>Learn Math, Science, Computer easily.</p>
  </div>

  <div class="card">
    <h2>🎮 Fun Zone</h2>
    <p>Enjoy jokes, puzzles, and mini games.</p>
    <button onclick="alert('Keep learning and have fun! 🚀')">Click Me</button>
  </div>

  <div class="card">
    <h2>🧠 Knowledge</h2>
    <p>Internet, Forms, Tables and more basics.</p>
  </div>

</div>

<footer>
  <p>Made with ❤️ using GitHub Pages</p>
</footer>

</body>
</html>
