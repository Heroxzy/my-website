<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Study Hub</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:25px;
  background: rgba(0,0,0,0.3);
}

.header h1{
  margin:0;
  font-size:26px;
}

/* CARDS */
.container{
  padding:15px;
}

.card{
  background: rgba(255,255,255,0.1);
  margin:15px 0;
  padding:18px;
  border-radius:15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.card h3{
  margin:0 0 10px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-size:16px;
}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background: rgba(0,0,0,0.5);
}

.nav div{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
}

.page{
  display:none;
}

.active{
  display:block;
}
</style>
</head>

<body>

<div class="header">
  <h1>📱 Fun Study Hub</h1>
  <p>Learn • Play • Explore</p>
</div>

<!-- HOME -->
<div id="home" class="page active container">

  <div class="card">
    <h3>📚 Study Zone</h3>
    <p>Math, Science, Computer basics</p>
  </div>

  <div class="card">
    <h3>🎮 Fun Game</h3>
    <p>Guess number game</p>
    <button onclick="game()">Play</button>
  </div>

  <div class="card">
    <h3>📖 Quiz</h3>
    <p>Test your knowledge</p>
    <button onclick="quiz()">Start Quiz</button>
  </div>

</div>

<!-- GAME PAGE -->
<div id="game" class="page container">
  <div class="card">
    <h3>🎮 Guess Game</h3>
    <button onclick="playGame()">Start Game</button>
  </div>
</div>

<!-- QUIZ PAGE -->
<div id="quiz" class="page container">
  <div class="card">
    <h3>📖 Quiz</h3>
    <p>Internet is?</p>
    <button onclick="answer(true)">Network of computers</button>
    <button onclick="answer(false)">Only social media</button>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠 Home</div>
  <div onclick="show('game')">🎮 Game</div>
  <div onclick="show('quiz')">📖 Quiz</div>
</div>

<script>
function show(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function game(){
  show('game');
}

function playGame(){
  let num = Math.floor(Math.random()*5)+1;
  let guess = prompt("Guess number 1-5");
  if(guess == num){
    alert("🎉 Correct!");
  }else{
    alert("❌ Wrong! Answer was " + num);
  }
}

function quiz(){
  show('quiz');
}

function answer(correct){
  if(correct){
    alert("✅ Correct!");
  }else{
    alert("❌ Wrong!");
  }
}
</script>

</body>
</html>
