<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Study Hub</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
  }

  /* TOP BAR */
  .topbar {
    background: #4CAF50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  /* CONTENT */
  .content {
    padding: 15px;
  }

  .card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  /* BUTTON */
  .btn {
    background: #4CAF50;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 10px;
    width: 100%;
    font-size: 16px;
  }

  /* BOTTOM NAV */
  .navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: white;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
  }

  .nav-item {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 14px;
  }

  .nav-item:hover {
    background: #f0f0f0;
  }
</style>

</head>

<body>

<div class="topbar">📱 Fun Study Hub</div>

<div class="content">

  <div class="card">
    <h3>📚 Study</h3>
    <p>Math, Science, Computer basics</p>
  </div>

  <div class="card">
    <h3>🎮 Fun Zone</h3>
    <p>Jokes, puzzles, mini games</p>
    <button class="btn" onclick="alert('Keep learning 🚀')">Click Me</button>
  </div>

  <div class="card">
    <h3>🧠 Knowledge</h3>
    <p>Internet, Forms, Tables, Network</p>
  </div>

</div>

<div class="navbar">
  <div class="nav-item">🏠 Home</div>
  <div class="nav-item">📚 Study</div>
  <div class="nav-item">🎮 Fun</div>
  <div class="nav-item">⚙️ More</div>
</div>

</body>
</html>
